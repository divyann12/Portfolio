<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        div{
            color: blue;
        }
        p{
            color: red;
        }
        .red-container{
            width:  300px;
            height: 300px;
            border: 4px solid green;
            background-color: orange;

        }
        #rectangle{
            width: 500px;
            height: 100px;
            border: 3px solid blue;
            background-color: purple;
        }
    </style>
</head>
<body>
    <div> <h1>CSS Basic</h1></div>
    <p><h2>CSS Paragraph</h2></p>
    <div><h2>CSS Div Tag</h2></div>
    <div class="red-container"></div>
    <br>
    <div id="rectangle"></div>
    <h1 class="heading-2">External CSS</h1>
</body>
</html>
